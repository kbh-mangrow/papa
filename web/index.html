<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/papa/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DeliveryPapa">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="papa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>papa</title>
  <link rel="manifest" href="manifest.json">

  <script>
    window.sendToNative = function(message) {
      if (window.webkit &&
          window.webkit.messageHandlers &&
          window.webkit.messageHandlers.iOSBridge) {

        window.webkit.messageHandlers.iOSBridge.postMessage(message);
        return true;
      }

      if (typeof AndroidBridge !== 'undefined' &&
          AndroidBridge.postMessage) {

        AndroidBridge.postMessage(String(message));
        return true;
      }

      console.warn('No native bridge found');
      return false;
    };

    window.sendToAndroid = window.sendToNative;

    // Native → Web
    window.onNativeMessage = function(message) {
      console.log('from native:', message);

      if (window.fromJs) {
        window.fromJs(message);
      }
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
